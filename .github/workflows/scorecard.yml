name: OpenSSF Scorecard (advisory)

# R0.3: OpenSSF Scorecard runs as an advisory job — assesses the repo
# for risky security practices (mutable action pins, missing branch
# protection, dependency confusion exposure, etc.) and emits SARIF for
# the Security tab. Non-blocking by default: a low score doesn't fail
# CI here. Promoting to blocking is a separate decision once the
# initial assessment baselines what's actionable vs noise.
#
# Schedule + push trigger so the score doesn't go stale, and the
# default branch's findings stay visible in GitHub's Security tab.
#
# Permissions:
#   security-events: write   — upload SARIF to code scanning
#   id-token: write          — Sigstore-attested publishing of results
#                              (Scorecard uses keyless signing for the
#                              public results.json artifact)
#   contents: read           — minimum default for everything else

on:
  branch_protection_rule:
  schedule:
    # Weekly, Mondays 06:42 UTC. Off-peak; avoids GitHub's noon-UTC
    # cron-storm congestion.
    - cron: '42 6 * * 1'
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # SARIF upload to GitHub code scanning
      id-token: write           # Sigstore keyless signing of results

    steps:
    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false

    - name: Run Scorecard analysis
      uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
      with:
        results_file: results.sarif
        results_format: sarif
        # Public repos get free, signed publication of results to
        # api.securityscorecards.dev. Set to false to skip publication
        # while keeping the SARIF upload. Initial pass: skip publication
        # so we can see results before publishing them.
        publish_results: false

    - name: Upload SARIF to GitHub Security tab
      # Must reference the upload-sarif SUB-action, not the codeql-action
      # ROOT — the root action.yml is a stub that echoes "read the docs" and
      # exits 1 (it rejects the sarif_file input), which is why every push to
      # main failed this advisory job. Same SHA pin (a real codeql-action v3
      # commit, so the /upload-sarif sub-path resolves at it), so the R0.3
      # SHA-pin lint stays satisfied.
      uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3
      with:
        sarif_file: results.sarif
