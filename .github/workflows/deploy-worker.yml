name: Deploy Cloudflare Worker

# Manual-dispatch only for now — the first deploy is user-driven
# (wrangler login + secret put), so CI is the second-and-onward path.
# Flip to push-on-tag (like publish-pypi.yml) once the deploy cycle
# is stable and you want automatic releases.
#
# Requires two GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" scope,
#                            created at dash.cloudflare.com/profile/api-tokens
#   CLOUDFLARE_ACCOUNT_ID  — visible in the Cloudflare dashboard URL
#
# Cloudflare also supports OIDC for Workers now (see cloudflare/
# wrangler-action@v3), but token auth is simpler for the first pass.
# OIDC migration is a follow-up when the deploy cadence justifies it.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (reserved for future: staging / production)."
        type: choice
        default: production
        options: [production]

permissions:
  contents: read

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-worker
      url: https://sum-demo.workers.dev
    steps:
      - name: Harden runner (audit-only)
        # R0.3: StepSecurity Harden-Runner in audit mode. Watches but
        # doesn't block; records network egress / file changes /
        # process activity so anomalies are visible. Audit mode is
        # the right default; flip to block-mode once we've confirmed
        # the legitimate egress allowlist (Cloudflare API, npm
        # registry).
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: "22"

      - name: Install worker deps
        working-directory: worker
        run: npm install

      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
