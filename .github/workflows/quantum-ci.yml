name: SUM Knowledge OS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  zig-core:
    name: Zig Core (BigInt Arithmetic)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Zig 0.15
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build libsum_core (ReleaseFast)
      run: zig build -Doptimize=ReleaseFast
      working-directory: core-zig

    - name: Run Zig Built-in Tests
      run: zig build test
      working-directory: core-zig

    - name: Build WASM target (proves source compiles)
      # Cross-compiles the same src/main.zig to wasm32-freestanding
      # with ReleaseSmall. Output at core-zig/zig-out/bin/sum_core.wasm.
      # We do NOT compare the built binary to the committed blob
      # byte-for-byte — Zig cross-version compilation produces
      # different output from identical source (observed: 0.15.2 vs
      # 0.16.0 disagree on 97 KB of WASM that both pass the fixture
      # self-test). The real invariant is the prime contract, which
      # the next step enforces against the committed binary.
      run: zig build wasm
      working-directory: core-zig

    - name: Run sum_core.wasm fixture self-test (committed + fresh)
      # Two runs, one contract: the sha256_64_v1 prime values for the
      # fixture axiom keys must match the Python / Node / Browser
      # reference, regardless of which binary is loaded.
      #   (a) the committed blob under single_file_demo/
      #   (b) a fresh core-zig/ build under the current toolchain.
      # Both must pass. Source drifted without a rebuild? (a) stays
      # correct (committed bytes haven't changed) but someone should
      # explain why main.zig was edited and no one rebuilt. Contract
      # changed on the source side? (b) fails on the updated build
      # while (a) still passes, surfacing the regression. Zig cross-
      # version byte differences? Neither fails — the contract is
      # what matters, not the binary layout.
      run: |
        node single_file_demo/test_wasm.js
        SUM_WASM_PATH=core-zig/zig-out/bin/sum_core.wasm node single_file_demo/test_wasm.js

  mathematical-verification:
    name: Python Gödel-State Algebra
    needs: zig-core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: 'requirements-prod.txt'

    - name: Install Zig 0.15
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build Zig Core for Python FFI
      run: zig build -Doptimize=ReleaseFast
      working-directory: core-zig

    - name: Install Quantum OS Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-prod.txt

    - name: Download Spacy Model
      run: python -m spacy download en_core_web_sm

    - name: Run Gödel-State Algebra Bounds
      env:
        SUM_DEBUG_INDEX: "1"
      run: |
        python -m pytest Tests/ -v

    - name: Run Fortress Gate (21 checks)
      run: |
        python scripts/verify_fortress.py --json

  cross-runtime-harness:
    name: Cross-Runtime Trust Triangle (Python ↔ Node)
    needs: zig-core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: 'requirements-prod.txt'

    # Node 22 ships Ed25519 in WebCrypto (required since 18.4). Pin to
    # a specific LTS so K3 ('Ed25519-signed bundle verifies Python →
    # verify.js via SubtleCrypto') and K4 ('tampered bundle rejected')
    # exercise the positive and negative Ed25519 paths, not the
    # 'unsupported' fallback.
    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-prod.txt

    - name: Run K1/K1-multiword/K2/K3/K4 kill-experiments
      # K1 + K1-multiword: CanonicalBundle structural round-trip
      # K2:               verify.js cleanly rejects VC 2.0 (named error)
      # K3:               Ed25519-signed bundle verifies Python → Node
      # K4:               Tampered Ed25519 bundle fails at Node verifier
      # Non-zero exit here means the trust triangle drifted — hard-stop merge.
      run: python -m scripts.verify_cross_runtime

  pypi-install-smoke:
    name: pip install sum-engine (fresh venv smoke)
    needs: zig-core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build sdist + wheel
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist --wheel --outdir dist

    - name: Install wheel in clean venv and run attest | verify
      # Lock the shipping promise: every commit on main must survive a
      # cold-install attest→verify round-trip in a venv that shares
      # nothing with the repo checkout (no PYTHONPATH, no dev deps).
      # Catches packaging regressions before PyPI publish.
      #
      # The spaCy model is pre-downloaded into the smoke venv so the
      # attest step exercises the happy path, not the auto-download
      # fallback. (The auto-download path is also safe — syntactic_sieve
      # routes it to stderr — but pre-downloading is faster and lets the
      # attest|verify redirect test stdout cleanliness specifically.)
      run: |
        python -m venv /tmp/sumtest
        /tmp/sumtest/bin/pip install --quiet "dist/$(ls dist | grep '.whl$')[sieve]"
        /tmp/sumtest/bin/python -m spacy download en_core_web_sm
        /tmp/sumtest/bin/sum --version
        echo "Alice likes cats. Bob owns a dog." | /tmp/sumtest/bin/sum attest --extractor=sieve > /tmp/bundle.json
        /tmp/sumtest/bin/sum verify --input /tmp/bundle.json
