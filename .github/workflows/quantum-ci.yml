name: SUM Knowledge OS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# R0.3: workflow-level GITHUB_TOKEN scope minimum-default. Individual
# jobs override only when they need a larger scope (none in this
# workflow currently — read-only is sufficient for testing). Mirrors
# publish-pypi.yml + deploy-worker.yml which already had this.
permissions:
  contents: read

jobs:
  workflow-pin-lint:
    name: Workflow action SHA-pin lint (R0.3)
    # Runs early so a tag-pinned action regression fails fast before
    # any of the heavier jobs spend minutes. The script is pure-stdlib
    # Python — no install, no network.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"

    - name: Lint .github/workflows/*.yml for non-SHA action pins
      run: python scripts/lint_workflow_pins.py

  zig-core:
    name: Zig Core (BigInt Arithmetic)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Install Zig 0.15
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
      with:
        version: 0.15.2

    - name: Build libsum_core (ReleaseFast)
      run: zig build -Doptimize=ReleaseFast
      working-directory: core-zig

    - name: Run Zig Built-in Tests
      run: zig build test
      working-directory: core-zig

    - name: Build WASM target (proves source compiles)
      # Cross-compiles the same src/main.zig to wasm32-freestanding
      # with ReleaseSmall. Output at core-zig/zig-out/bin/sum_core.wasm.
      # We do NOT compare the built binary to the committed blob
      # byte-for-byte — Zig cross-version compilation produces
      # different output from identical source (observed: 0.15.2 vs
      # 0.16.0 disagree on 97 KB of WASM that both pass the fixture
      # self-test). The real invariant is the prime contract, which
      # the next step enforces against the committed binary.
      run: zig build wasm
      working-directory: core-zig

    - name: Run sum_core.wasm fixture self-test (committed + fresh)
      # Two runs, one contract: the sha256_64_v1 prime values for the
      # fixture axiom keys must match the Python / Node / Browser
      # reference, regardless of which binary is loaded.
      #   (a) the committed blob under single_file_demo/
      #   (b) a fresh core-zig/ build under the current toolchain.
      # Both must pass. Source drifted without a rebuild? (a) stays
      # correct (committed bytes haven't changed) but someone should
      # explain why main.zig was edited and no one rebuilt. Contract
      # changed on the source side? (b) fails on the updated build
      # while (a) still passes, surfacing the regression. Zig cross-
      # version byte differences? Neither fails — the contract is
      # what matters, not the binary layout.
      run: |
        node single_file_demo/test_wasm.js
        SUM_WASM_PATH=core-zig/zig-out/bin/sum_core.wasm node single_file_demo/test_wasm.js

  mathematical-verification:
    name: Python Gödel-State Algebra
    needs: zig-core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: 'requirements-prod.txt'

    - name: Install Zig 0.15
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
      with:
        version: 0.15.2

    - name: Build Zig Core for Python FFI
      run: zig build -Doptimize=ReleaseFast
      working-directory: core-zig

    - name: Install Quantum OS Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-prod.txt

    - name: Download Spacy Model
      run: python -m spacy download en_core_web_sm

    - name: Run Gödel-State Algebra Bounds
      env:
        SUM_DEBUG_INDEX: "1"
      run: |
        python -m pytest Tests/ -v

    - name: Run Fortress Gate (21 checks)
      run: |
        python scripts/verify_fortress.py --json

  cross-runtime-harness:
    name: Cross-Runtime Trust Triangle (Python ↔ Node)
    needs: zig-core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: 'requirements-prod.txt'

    # Node 22 ships Ed25519 in WebCrypto (required since 18.4). Pin to
    # a specific LTS so K3 ('Ed25519-signed bundle verifies Python →
    # verify.js via SubtleCrypto') and K4 ('tampered bundle rejected')
    # exercise the positive and negative Ed25519 paths, not the
    # 'unsupported' fallback.
    - name: Set up Node.js 22
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: "22"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-prod.txt

    - name: Run K1/K1-multiword/K2/K3/K4 valid-path kill-experiments
      # K1 + K1-multiword: CanonicalBundle structural round-trip
      # K2:               verify.js cleanly rejects VC 2.0 (named error)
      # K3:               Ed25519-signed bundle verifies Python → Node
      # K4:               Tampered Ed25519 bundle fails at Node verifier
      # Non-zero exit here means the trust triangle drifted — hard-stop merge.
      run: python -m scripts.verify_cross_runtime

    - name: Run A1-A6 adversarial rejection matrix
      # Companion to the K-matrix: proves the two verifiers agree on
      # INVALIDITY as well as validity. Each fixture is a deliberately
      # malformed bundle (missing tome, tampered signature, unknown
      # format version, …); both verifiers must reject AND classify
      # the rejection equivalently (structural / signature / scheme /
      # version). Disagreement = runtime asymmetry; non-zero exit
      # hard-stops the merge.
      run: python -m scripts.verify_cross_runtime_adversarial

    - name: Run K1-v2/K2-v2 sha256_128_v2 byte-identity gate
      # Cross-runtime parity for the future-default prime scheme.
      # 12 axiom-key fixtures + 6 state-encoding fixtures, Python's
      # sympy.nextprime(seed_128) vs Node's derivePrimeV2 (BPSW). The
      # default scheme stays sha256_64_v1; this gate locks v2 as
      # cross-runtime byte-identical so a future operator-decision to
      # flip the default does not silently regress.
      run: python -m scripts.verify_godel_v2_cross_runtime

  vendor-byte-equivalence:
    name: Vendored jose + canonicalize byte-equivalence
    # Mirrors the zig-core sum_core.wasm drift gate. Re-runs
    # scripts/vendor/build.js from the lockfile-pinned dep versions
    # and asserts the freshly-built single_file_demo/vendor/sum-
    # verify-deps.js bytes match what's committed. Drift fails the
    # gate with an actionable remediation message — either re-run
    # the build locally and commit, or revert the dep bump in
    # scripts/vendor/package.json + package-lock.json.
    #
    # The single-file-demo property + open CORS on JWKS together
    # mean the verifier code that consumers execute IS the bytes
    # this gate validates. A silently-drifted vendored bundle
    # would weaken the whole v0.9.B trust story.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Node 22
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: "22"

    - name: npm ci (pinned jose + canonicalize + esbuild)
      working-directory: scripts/vendor
      run: npm ci

    - name: Rebuild vendored bundle
      working-directory: scripts/vendor
      run: node build.js

    - name: Compare freshly-built bytes against committed
      run: |
        if ! git diff --exit-code -- single_file_demo/vendor/sum-verify-deps.js single_file_demo/vendor/LICENSE.txt; then
          echo ""
          echo "=== VENDORED BYTES DRIFT ==="
          echo ""
          echo "scripts/vendor/build.js produced different bytes than what is"
          echo "committed under single_file_demo/vendor/. This means either:"
          echo ""
          echo "  (a) A dependency was bumped in scripts/vendor/package.json"
          echo "      or package-lock.json without regenerating the bundle, OR"
          echo "  (b) The build script itself changed shape, OR"
          echo "  (c) An esbuild version bump changed bundling output."
          echo ""
          echo "Remediation:"
          echo "  cd scripts/vendor && npm ci && npm run build"
          echo "  git add single_file_demo/vendor/{sum-verify-deps.js,LICENSE.txt}"
          echo "  git commit -m 'vendor: regen jose+canonicalize after dep bump'"
          echo ""
          echo "Or revert the dep change in scripts/vendor/package.json + lockfile."
          exit 1
        fi
        echo "vendored bytes match committed: OK"

    - name: Receipt-verifier smoke — JS (15 fixtures)
      # Exercises receipt_verifier.js against fixtures/render_
      # receipts/. Fails if positive_control doesn't verify or any
      # tampered fixture produces the wrong error class.
      run: node single_file_demo/test_render_receipt_verify.js

    - name: Set up Python 3.12 for v0.9.C verifier smoke
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"

    - name: Receipt-verifier smoke — Python (same 15 fixtures)
      # v0.9.C: cross-runtime equivalence with the JS verifier above.
      # Same fixture set, same expected error classes; both runtimes
      # MUST produce byte-identical outcomes on every fixture for
      # PROOF_BOUNDARY §1.8 to stand at "proved on adversarial inputs
      # across runtimes."
      run: |
        python -m pip install --upgrade pip
        pip install pytest "joserfc>=1.0.0" "cryptography>=41.0.0"
        python -m pytest Tests/test_render_receipt_verifier.py -q

    - name: Trust-root manifest round-trip — Python (R0.2)
      # R0.2: build → sign → verify round-trip with an in-memory test
      # keypair. 17 cases including all 9 tampered-payload-field
      # variants, schema mismatch, unknown kid, wrong key, and a
      # taxonomy-cross-surface check that trust_root.ErrorClass and
      # render_receipt.ErrorClass map to the same string values.
      run: python -m pytest Tests/test_trust_root.py -q

    - name: Property-based fuzz tests — Hypothesis (R0.4)
      # R0.4: Hypothesis property-based tests over JCS canonicalization
      # and the receipt + trust-root verifiers. Generates hundreds of
      # cases per property; catches the bug the fixture set didn't
      # anticipate. derandomize=True so failures are reproducible
      # across CI runs (no flaky surface).
      run: |
        pip install "hypothesis>=6.0.0"
        python -m pytest Tests/test_property_jcs.py Tests/test_property_receipt.py -q

    - name: NLI calibration fixture format (v0.9.E)
      # v0.9.E spec: pins the fixtures/nli_audit_calibration_v1.jsonl
      # row shape so a future implementation cycle's threshold
      # calibration can't be silently broken by a schema regression.
      # Format-only; no model loading, no inference, no extra deps.
      run: python -m pytest Tests/test_nli_calibration_format.py -q

  release-machinery-validation:
    name: Release machinery validation (no publish)
    # Validates the v0.3.1 hygiene gates on every push/PR so the FIRST
    # tag push isn't the FIRST real test of the release pipeline. Runs
    # the build + pre-publish gates verbatim from publish-pypi.yml's
    # `build` job, but never publishes and never calls live-index
    # verification. publish-pypi.yml's tag-version guard is excluded
    # here (it's tag-only by design) — the rest is exercised on every
    # commit so a hygiene-script bug surfaces in PR review, not at
    # release time.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"

    - name: Install build + hygiene tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine check-wheel-contents

    - name: Build sdist + wheel
      run: python -m build --sdist --wheel --outdir dist

    - name: twine check (renderability)
      run: twine check dist/*

    - name: check-wheel-contents (file-tree validity)
      run: check-wheel-contents dist/*.whl

    - name: README ↔ wheel METADATA + sdist PKG-INFO sync
      run: python scripts/check_long_description_sync.py

    - name: hash_dist.py emits valid sum.dist_hashes.v1
      run: |
        python scripts/hash_dist.py --out dist_hashes.json
        # Sanity-check the schema field; the verify script demands it
        # be exactly sum.dist_hashes.v1 and will SystemExit otherwise.
        python -c "
        import json
        d = json.load(open('dist_hashes.json'))
        assert d['schema'] == 'sum.dist_hashes.v1', d['schema']
        assert d['artifacts'], 'no artifacts'
        assert any(a['filename'].endswith('.whl') for a in d['artifacts']), 'no wheel'
        assert any(a['filename'].endswith('.tar.gz') for a in d['artifacts']), 'no sdist'
        print('OK:', len(d['artifacts']), 'artifact(s)', 'schema=', d['schema'])
        "

    - name: Smoke-compile all release scripts
      # Catches syntax-class bugs (missing imports, typos, etc.) before
      # they break a real release.
      run: |
        python -m py_compile scripts/hash_dist.py
        python -m py_compile scripts/check_long_description_sync.py
        python -m py_compile scripts/verify_pypi_attestation.py

    - name: Fixture tests for verify_pypi_attestation parsers
      # Pins assumptions about PyPI Integrity API JSON shape + Sigstore
      # SAN URI form. Without these, a parser bug + a schema drift can
      # both pass syntax checks while silently letting the wrong shape
      # through. Network paths are not exercised here — they compose,
      # but their happy paths are exercised by the live release pipeline.
      run: |
        python -m pip install pytest
        python -m pytest Tests/test_verify_pypi_attestation.py -q

  pypi-install-smoke:
    name: pip install sum-engine (fresh venv smoke)
    needs: zig-core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"

    - name: Build sdist + wheel
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist --wheel --outdir dist

    - name: Install wheel in clean venv and run attest | verify
      # Lock the shipping promise: every commit on main must survive a
      # cold-install attest→verify round-trip in a venv that shares
      # nothing with the repo checkout (no PYTHONPATH, no dev deps).
      # Catches packaging regressions before PyPI publish.
      #
      # The spaCy model is pre-downloaded into the smoke venv so the
      # attest step exercises the happy path, not the auto-download
      # fallback. (The auto-download path is also safe — syntactic_sieve
      # routes it to stderr — but pre-downloading is faster and lets the
      # attest|verify redirect test stdout cleanliness specifically.)
      run: |
        python -m venv /tmp/sumtest
        /tmp/sumtest/bin/pip install --quiet "dist/$(ls dist | grep '.whl$')[sieve]"
        /tmp/sumtest/bin/python -m spacy download en_core_web_sm
        /tmp/sumtest/bin/sum --version
        echo "Alice likes cats. Bob owns a dog." | /tmp/sumtest/bin/sum attest --extractor=sieve > /tmp/bundle.json
        /tmp/sumtest/bin/sum verify --input /tmp/bundle.json
