<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUM | Quantum Knowledge OS</title>
    <meta name="description" content="Gödel-State Engine — O(1) semantic operations over a mathematically verified knowledge graph">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: #050510;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        #network-container {
            width: 100vw; height: 100vh;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .hud {
            position: absolute; z-index: 10;
            top: 20px; left: 20px;
            background: rgba(10, 15, 30, 0.88);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(56, 189, 248, 0.15);
            backdrop-filter: blur(16px);
            width: 380px;
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7),
                        0 0 80px rgba(56, 189, 248, 0.05);
            display: flex; flex-direction: column; gap: 18px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .hud::-webkit-scrollbar { width: 4px; }
        .hud::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        .hud h1 {
            margin: 0; font-size: 28px; letter-spacing: -1.5px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .hud h1 span { -webkit-text-fill-color: #94a3b8; font-weight: 400; }

        #state-display, #axiom-count {
            font-family: 'JetBrains Mono', monospace;
            color: #64748b; font-size: 11px;
            word-break: break-all;
        }
        #axiom-count { color: #38bdf8; font-size: 12px; font-weight: 500; }

        .section-label {
            margin: 0 0 8px; font-size: 11px; font-weight: 600;
            color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;
        }

        textarea {
            width: 100%; height: 80px;
            background: #0c1222; border: 1px solid #1e293b;
            color: #f1f5f9; border-radius: 10px;
            padding: 12px; font-family: inherit; font-size: 13px;
            resize: none; outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }
        textarea:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }
        textarea::placeholder { color: #475569; }

        button {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: #fff; border: none;
            padding: 11px 16px; border-radius: 10px;
            cursor: pointer; font-weight: 600; font-size: 13px;
            width: 100%;
            transition: all 0.25s;
            letter-spacing: 0.3px;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }
        button:active { transform: translateY(0); }

        .result-box {
            background: #080e1a; padding: 12px;
            border-radius: 10px; font-size: 13px;
            color: #cbd5e1; min-height: 50px;
            border: 1px solid #1e293b;
            line-height: 1.6;
            max-height: 200px; overflow-y: auto;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #1e293b, transparent);
        }

        .sync-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #22c55e; border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        .terminal {
            background: #020617; border: 1px solid #1e293b;
            border-radius: 8px; padding: 10px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: #10b981; height: 140px; overflow-y: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .terminal p { margin: 2px 0; }
        .log-warn { color: #f59e0b; }
        .log-superposition { color: #8b5cf6; }
        .log-collapse { color: #0ea5e9; font-weight: bold; }
    </style>
</head>
<body>
    <div class="hud">
        <div>
            <h1>SUM<span>_OS</span></h1>
            <div style="margin-top: 8px; font-size: 12px; color: #475569;">
                <span class="sync-dot"></span>Live Gödel Sync
            </div>
        </div>

        <div id="state-display">Gödel State: 1</div>
        <div id="axiom-count">Axioms: 0</div>

        <div class="divider"></div>

        <div>
            <p class="section-label">① Tomes → Tags (Ingest)</p>
            <textarea id="ingest-box" placeholder="Paste raw text to crystallize into exact mathematics..."></textarea>
            <button id="ingest-btn" onclick="ingestText()">Extract to Gödel State</button>
        </div>

        <div class="divider"></div>

        <div>
            <p class="section-label">② Tags → Tomes (Extrapolate)</p>
            <textarea id="extrapolate-tags" placeholder="Enter comma-separated axiom keys&#10;e.g. alice||age||30, bob||role||admin"></textarea>
            <button id="extrapolate-btn" onclick="extrapolateTags()">Generate Verified Tome</button>
            <div id="extrapolate-result" class="result-box" style="margin-top: 10px;">
                Awaiting extrapolation…
            </div>
        </div>

        <div class="divider"></div>

        <div>
            <p class="section-label">③ System Telemetry</p>
            <div id="telemetry-terminal" class="terminal">
                <p style="color: #475569;">Awaiting system events…</p>
            </div>
        </div>
    </div>

    <div id="network-container"></div>

    <script src="/static/js/godel_client.js"></script>
    <script>
        const container = document.getElementById('network-container');
        const client = new GodelClient();
        const data = { nodes: client.nodes, edges: client.edges };
        const options = {
            nodes: {
                shape: 'dot', size: 16,
                font: { color: '#e2e8f0', size: 13, face: 'Inter', strokeWidth: 3, strokeColor: '#050510' },
                color: { background: '#38bdf8', border: '#0284c7', highlight: { background: '#60a5fa', border: '#3b82f6' } },
                borderWidth: 2
            },
            edges: {
                font: { color: '#94a3b8', size: 10, face: 'Inter', align: 'top', strokeWidth: 0 },
                color: { color: '#1e3a5f', highlight: '#60a5fa', opacity: 0.7 },
                smooth: { type: 'continuous' }, width: 1.5
            },
            physics: {
                forceAtlas2Based: { gravitationalConstant: -45, centralGravity: 0.005, springLength: 100, springConstant: 0.07, damping: 0.4 },
                solver: 'forceAtlas2Based'
            },
            interaction: { hover: true, tooltipDelay: 200 }
        };

        const network = new vis.Network(container, data, options);
        network.on("selectEdge", function (params) {
            if (params.edges.length > 0) {
                const box = document.getElementById('extrapolate-tags');
                const edgeId = params.edges[0];
                box.value = box.value ? box.value + ", " + edgeId : edgeId;
            }
        });
        client.startAutoSync(2000);

        async function ingestText() {
            const btn = document.getElementById('ingest-btn');
            const box = document.getElementById('ingest-box');
            const text = box.value.trim();
            if (!text) return;
            btn.innerText = "Crystallizing…"; btn.style.opacity = "0.6"; btn.style.pointerEvents = "none";
            try {
                const res = await fetch('/api/v1/quantum/ingest', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
                if (!res.ok) throw new Error(await res.text());
                box.value = '';
                await client.syncWithServer();
            } catch (e) { console.error(e); alert("Ingestion failed: " + e.message); }
            finally { btn.innerText = "Extract to Gödel State"; btn.style.opacity = "1"; btn.style.pointerEvents = "auto"; }
        }

        async function extrapolateTags() {
            const btn = document.getElementById('extrapolate-btn');
            const box = document.getElementById('extrapolate-tags');
            const result = document.getElementById('extrapolate-result');
            const tags = box.value.split(',').map(t => t.trim()).filter(Boolean);
            if (!tags.length) return;
            btn.innerText = "Running Epistemic Loop…"; btn.style.opacity = "0.6"; btn.style.pointerEvents = "none";
            result.innerText = "Proving mathematical fidelity…";
            try {
                const res = await fetch('/api/v1/quantum/extrapolate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ target_axioms: tags }) });
                const data = await res.json();
                result.innerText = data.verified_narrative || data.detail || "No response.";
            } catch (e) { console.error(e); result.innerText = "Extrapolation failed: " + e.message; }
            finally { btn.innerText = "Generate Verified Tome"; btn.style.opacity = "1"; btn.style.pointerEvents = "auto"; }
        }

        // ─── SSE Telemetry ────────────────────────────────
        const evtSource = new EventSource("/api/v1/quantum/telemetry");
        const terminal = document.getElementById("telemetry-terminal");

        evtSource.onmessage = function(event) {
            const p = document.createElement("p");
            p.innerText = "> " + event.data;
            if (event.data.includes("⚠")) p.className = "log-warn";
            else if (event.data.includes("🌀")) p.className = "log-superposition";
            else if (event.data.includes("⚡")) p.className = "log-collapse";
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        };
        evtSource.onerror = function() { console.log("Telemetry stream disconnected, retrying..."); };
    </script>
</body>
</html>
